name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'H.U.D Manager Overlay ${{ github.ref_name }}'
          releaseBody: |
            ## H.U.D Manager Overlay ${{ github.ref_name }}

            Always-on-top overlay for Star Citizen. Runs H.U.D Manager floating over the game.

            **Install:** Download `hud-manager-overlay_*_x64-setup.exe` and run it.
            **Toggle:** `Ctrl+Shift+H` or click the system tray icon.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
